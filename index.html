<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacred Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #8e6d45; --bg-color: #fcf9f5; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg-color); color: #333; margin: 0; padding: 15px; }
        h2 { text-align: center; color: var(--main-color); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; border-radius: 8px; height: 140px; object-fit: cover; }
        .title { font-size: 14px; font-weight: bold; margin: 8px 0; min-height: 34px; }
        .price { color: var(--main-color); font-weight: bold; margin-bottom: 10px; }
        button { background: var(--main-color); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; transition: 0.3s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h2>Духовные Артефакты ✨</h2>
    <div class="grid" id="catalog"></div>

    <script src="products.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const catalog = document.getElementById('catalog');

        // Рендер товаров
        if (typeof products !== 'undefined') {
            products.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                    <div class="title">${item.name}</div>
                    <div class="price">${item.price} ₽</div>
                    <button onclick="sendOrder('${item.name}')">Купить</button>
                `;
                catalog.appendChild(card);
            });
        }

        function sendOrder(name) {
            tg.sendData("Заказ: " + name);
            tg.close();
        }
    </script>
</body>
</html>
