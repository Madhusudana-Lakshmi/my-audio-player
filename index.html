<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vaishnava Lectoriya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        
     body {
            font-family: -apple-system, system-ui, sans-serif;
            color: #fff; /* Возвращаем белый текст */
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a1a2e 0%, #000 70%);
background-attachment: fixed; /* Чтобы фон не уплывал при скролле */
            min-height: 100vh;
        }

.header {
    position: fixed !important;
    top: 1px !important;
    
    /* ЦЕНТРУЕМ ОСТРОВОК */
    left: 50% !important;
    transform: translateX(-50%) !important;
    
    /* ГИБКАЯ ШИРИНА */
    width: 97% !important;      /* На мобилках будет почти во всю ширину */
    max-width: 600px !important; /* На компьютере не станет шире 500px */
    
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    min-height: 100px !important;
    padding: 15px !important;
    
    /* ТВОЯ КАРТИНКА */
    background-image: url('https://sfwlfdxwqnrvypaifayi.supabase.co/storage/v1/object/public/folder-covers/folder-covers/444444.png') !important;
    background-color: rgba(20, 20, 20, 0.6) !important;
    background-size: contain !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    
    /* СТИЛЬ СТЕКЛА */
    backdrop-filter: blur(15px) !important;
    -webkit-backdrop-filter: blur(15px) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    border-radius: 30px 30px 0 0 !important;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    
    z-index: 3000 !important;
    box-sizing: border-box;
}

#content {
    margin-top: 110px !important; 
    margin-bottom: 20px !important;
    margin-left: auto !important;
    margin-right: auto !important;
    width: 97% !important;
    max-width: 600px !important;
    background: rgba(255, 255, 255, 0.03) !important;
    backdrop-filter: blur(10px) !important;
    -webkit-backdrop-filter: blur(10px) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    border-radius: 0 0 30px 30px !important;
    
    /* СТРОКА 72: Уменьшаем внутренний отступ, чтобы папки не жались к центру */
    padding: 12px !important; 
    
    padding-bottom: 220px !important;
    box-sizing: border-box;
    min-height: 85vh;
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;

    /* СТРОКА 80: ГЛАВНЫЙ ПАРАМЕТР ПЛОТНОСТИ */
    /* Ставим 6px — это сделает папки кучными и красивыми */
    gap: 6px !important; 
}
.item {
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        position: relative;
        overflow: hidden;
        display: flex !important;
        flex-direction: column;
        justify-content: flex-end;
        height: 160px;
        min-width: 0 !important; /* Позволяет папкам сжиматься в сетку */
        width: 100% !important;
        background-color: rgba(255, 255, 255, 0.05) !important; /* Легкий стеклянный оттенок */
    background-position: center !important; /* Картинка всегда по центру */
    background-size: cover !important; /* Картинка заполняет всю папку */
    background-repeat: no-repeat !important; /* Еще прозрачнее */
    backdrop-filter: blur(12px) !important; /* Размытие сильнее — эффект станет «дороже» */
    will-change: transform;
        cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.3s;
    }
       .item:active {
   transform: scale(0.95) !important;
background-color: rgba(255, 255, 255, 0.15) !important;
transition: transform 0.1s ease-out; /* Убираем 0s, даем 0.1s для мягкости */
}
        /* РЕЖИМ СПИСКА ДЛЯ ФАЙЛОВ */

/* ============================================================
   РЕЖИМ СПИСКА ДЛЯ ФАЙЛОВ (ИСПРАВЛЕННЫЙ: ПАПКИ НЕ ТРОГАЕМ)
   ============================================================ */

/* 1. ОСНОВНАЯ ПОЛОСКА ФАЙЛА */
.item.list-view-file {
    grid-column: 1 / -1 !important; /* Растягиваем полоску на всю ширину сетки */
    width: 100% !important;

    /* ВЫСОТА СТРОКИ: 32-36px - оптимально для плотного списка */
    height: 34px !important; 

    /* ВНУТРЕННИЙ ОТСТУП: чтобы текст не прилипал к краям полоски */
    padding: 0 12px !important; 

    /* ВНЕШНИЙ ВИД ПОЛОСКИ */
    border-radius: 6px !important; /* Легкое скругление углов */
    background: rgba(255, 255, 255, 0.05) !important; /* Цвет фона */
    
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    justify-content: flex-start !important;
    
    border: none !important;
    backdrop-filter: none !important;
    margin-bottom: 0 !important; 
}

/* 2. ТРЮК ДЛЯ ПЛОТНОСТИ (СХЛОПЫВАНИЕ ДЫР СЕТКИ) */
/* Этот код применяется ТОЛЬКО к файлам, которые идут сразу ПОСЛЕ другого файла */
.item.list-view-file + .item.list-view-file {
    /* Чтобы между файлами остался зазор ровно в 1 пиксель: 
       из GAP(6px) вычитаем 5px маржина. */
    margin-top: -5px !important; 
}

/* 3. ИКОНКА (НОТА) */
.item.list-view-file .item-icon {
    position: static !important;
    transform: none !important;
    font-size: 15px !important; /* РАЗМЕР ИКОНКИ */
    margin-right: 10px !important; /* ОТСТУП от иконки до названия */
    opacity: 0.5 !important;
}

/* 4. ТЕКСТ (НАЗВАНИЕ ЛЕКЦИИ) */
.item.list-view-file .item-name {
    position: static !important;
    font-size: 13px !important;  /* РАЗМЕР ШРИФТА */
    font-weight: 400 !important; 
    color: rgba(255, 255, 255, 0.9) !important;
    text-align: left !important;
    background: none !important;
    text-shadow: none !important;
    padding: 0 !important;
    
    /* Обрезка длинных названий троеточием */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis; 
}

/* 5. КНОПКИ АДМИНА (Крестик и карандаш) */
.item.list-view-file .del-btn,
.item.list-view-file .edit-btn {
    width: 22px !important;
    height: 22px !important;
    font-size: 11px !important;
    position: absolute !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
    display: none !important; /* Скрыты в авто-режиме */
}

        /* НАЗВАНИЕ ВНИЗУ */
        .item-name {
            font-size: 13px; 
            font-weight: 500; 
            line-height: 1.2;
            padding: 8px 5px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,1); 
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0) 100%);
        }
        .item-icon {
            font-size: 32px;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            z-index: 1;
        }

       .item.is-playing { 
    border: 2px solid #3897f0 !important; 
    background: rgba(56, 151, 240, 0.25) !important; 
    box-shadow: 
        0 0 15px rgba(56, 151, 240, 0.6), 
        inset 0 0 10px rgba(56, 151, 240, 0.3) !important;
    transform: scale(1.01);
    z-index: 5; 
}

        .done-mark { color: #4CAF50; font-weight: bold; margin-left: 5px; font-size: 14px; }
        .item.is-done { border: 1px solid rgba(76, 175, 80, 0.4); background: rgba(76, 175, 80, 0.1); }

 /* ПОЛНАЯ ЗАМЕНА СТИЛЕЙ ПЛЕЕРА ДЛЯ МАТЧА СО СКРИНШОТОМ */
#player-container {
    position: fixed !important;
    bottom: 10px !important;    /* Чуть приподняли от края */
    left: 50% !important;
    transform: translateX(-50%) !important;
    width: 92% !important;      /* Сделали чуть уже по бокам */
    max-width: 600px !important; /* Ограничили максимальную ширину */
    
    background: rgba(20, 20, 20, 0.85) !important;
    backdrop-filter: blur(20px) saturate(180%) !important;
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    border-radius: 24px !important; /* Чуть менее скругленный для компактности */
    
    padding: 12px 18px !important;  /* Уменьшили отступы (было 20+) */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
    display: none;
    flex-direction: column !important;
    z-index: 4000 !important;
}

        .time-info { 
            display: flex; justify-content: space-between; 
            width: 90%; margin: 0 auto 5px; 
            font-size: 12px; font-family: monospace; color: #aaa;
        }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 5px; }
        .btn-play { width: 50px; height: 50px; border-radius: 50%; background: var(--tg-theme-button-color, #3897f0); border: none; font-size: 30px; color: #fff; cursor: pointer;}
        
        #progress-bar { width: 90%; margin: 0 auto 10px; height: 12px; accent-color: var(--tg-theme-button-color, #3897f0); }
       .back-btn {
    position: fixed; 
    top: 90px;       
    left: 10px;      
    z-index: 3100;   
    padding: 10px 15px;
    background: rgba(0, 0, 0, 0.6); 
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    backdrop-filter: blur(5px); 
}
        
    </style>
</head>
<body>
    <div id="admin-panel" style="display: none;"></div>

    <div class="header" style="background-image: url('https://sfwlfdxwqnrvypaifayi.supabase.co/storage/v1/object/public/folder-covers/folder-covers/333333.jpg');"></div>
    <div id="back-container" class="back-btn" style="display: none;" onclick="goBack()">⬅ Назад</div>
    <div id="content">Подключение к базе данных...</div>

    <div id="player-container">
        <div id="now-playing" style="text-align: center; margin-bottom: 10px; padding: 0 15px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
        <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration-time">0:00</span>
        </div>
        <input type="range" id="progress-bar" value="0">
        <div class="controls">
            <button onclick="skip(-15)" style="background:none; border:none; color:#fff; font-size:30px; cursor:pointer;">⏪</button>
            <button id="play-pause" class="btn-play" onclick="togglePlay()">▶</button>
            <button onclick="skip(15)" style="background:none; border:none; color:#fff; font-size:30px; cursor:pointer;">⏩</button>
        </div>
        <button onclick="stopPlayer()" style="margin-top:15px; background:none; border:none; color:#666; font-size: 14px; cursor:pointer;">Закрыть</button>
    </div>

    <audio id="main-audio"></audio>

    <script>
        // Инициализация Telegram
        let tg;
        try { tg = window.Telegram.WebApp; tg.expand(); } catch(e) {}

        const SUPABASE_URL = 'https://sfwlfdxwqnrvypaifayi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmd2xmZHh3cW5ydnlwYWlmYXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjU3NzksImV4cCI6MjA4OTk0MTc3OX0.euqolkndodGmo0AJPaiCh60VU9nJjOZ11dz5boVTjnQ';
        
        // В будущем здесь будет ссылка на твой Worker (чтобы аудио играло из Telegram)
        const WORKER_URL = 'https://tg-audio-proxy.madhusudana108.workers.dev'; 

        const audio = document.getElementById('main-audio');
        const prog = document.getElementById('progress-bar');
        
        let folderHistory = []; 
        let currentPath = ''; // Корневая папка
        let currentFileId = null;
        let currentFilesList = [];
        let allDatabaseItems = []; // Кэш всех файлов из базы

        const saveProgress = (id, time) => localStorage.setItem(`pos_${id}`, time);
        const getProgress = (id) => parseFloat(localStorage.getItem(`pos_${id}`)) || 0;
        const markDone = (id) => localStorage.setItem(`done_${id}`, 'true');
        const isDone = (id) => localStorage.getItem(`done_${id}`) === 'true';

        // Первичная загрузка всей базы
        async function fetchAllData() {
            try {
                // Тянем данные из новой таблицы drive_elements
                const res = await fetch(`${SUPABASE_URL}/rest/v1/drive_elements?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                allDatabaseItems = await res.json();
                loadContent('', false);
            } catch (err) {
                document.getElementById('content').innerText = 'Ошибка загрузки данных.';
                console.error(err);
            }
        }

        // Логика виртуальных папок
        function loadContent(pathStr, addToHistory = true) {
            if (addToHistory && currentPath !== null) folderHistory.push(currentPath);
            currentPath = pathStr;
            document.getElementById('back-container').style.display = pathStr === '' ? 'none' : 'block';
            
            const folders = new Set();
            const items = [];

            // Проходим по всем файлам в базе и строим структуру
            allDatabaseItems.forEach(item => {
                // Унифицируем слеши (на случай Windows)
                let normPath = item.path.replace(/\\/g, '/');
                
                if (pathStr === '') {
                    if (normPath.includes('/')) {
                        folders.add(normPath.split('/')[0]); // Это папка
                    } else {
                        items.push({ ...item, display_name: normPath }); // Это файл в корне
                    }
                } else {
                    if (normPath.startsWith(pathStr + '/')) {
                        const remainder = normPath.substring(pathStr.length + 1);
                        if (remainder.includes('/')) {
                            folders.add(remainder.split('/')[0]); // Вложенная папка
                        } else {
                            items.push({ ...item, display_name: remainder }); // Файл в текущей папке
                        }
                    }
                }
            });

            // Формируем финальный массив для отрисовки
            const finalItems = [];
            folders.forEach(f => {
                finalItems.push({ name: f, type: 'folder', path: (pathStr ? pathStr + '/' + f : f) });
            });
            items.forEach(i => {
                finalItems.push({ name: i.name || i.display_name, type: 'file', path: i.path, telegram_id: i.telegram_id });
            });

            render(finalItems);
        }

        function goBack() {
            const prevFolder = folderHistory.pop();
            loadContent(prevFolder || '', false);
        }

        function render(items) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            // Сортировка: сначала папки, потом файлы
            items.sort((a,b) => (a.type === b.type ? 0 : a.type === 'folder' ? -1 : 1));
            currentFilesList = items.filter(i => i.type === 'file');

            if (items.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; opacity: 0.5; padding: 20px;">Здесь пока пусто</div>';
                return;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                const uniqueId = item.telegram_id || item.path;
                const done = isDone(uniqueId);
                const isPlaying = (currentFileId === uniqueId); 

                div.className = `item item-type-${item.type} ${item.type === 'file' ? 'list-view-file' : ''} ${done ? 'is-done' : ''} ${isPlaying ? 'is-playing' : ''}`;
                
                const name = document.createElement('div');
                name.className = 'item-name';
                name.innerHTML = `${item.name} ${done ? '<span class="done-mark">✓</span>' : ''}`;
                name.setAttribute('data-id', uniqueId);

                // Иконка
                const icon = document.createElement('div');
                icon.className = 'item-icon';
                icon.innerHTML = item.type === 'folder' ? '📁' : '🎵';
                div.appendChild(icon);
                
                div.appendChild(name);

                // Логика клика
                div.onclick = () => {
                    if (item.type === 'folder') {
                        loadContent(item.path);
                    } else {
                        // Пока воркера нет, показываем сообщение
                        if (WORKER_URL === 'ЗДЕСЬ_БУДЕТ_ТВОЙ_ВОРКЕР') {
                            alert('Файл найден в базе! ID: ' + item.telegram_id + '\nОсталось подключить Worker для воспроизведения.');
                        } else {
                            const streamUrl = `${WORKER_URL}/stream/${item.telegram_id}`;
                            play(streamUrl, item.name, item.telegram_id);
                        }
                    }
                };

                container.appendChild(div);
            });
        }

        function formatTime(s) {
            if (!s) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function play(url, name, id) {
            currentFileId = id;
            document.getElementById('now-playing').innerText = name;
            document.querySelectorAll('.item').forEach(el => el.classList.remove('is-playing'));
            const currentNameEl = document.querySelector(`.item-name[data-id="${id}"]`);
            if (currentNameEl) currentNameEl.parentElement.classList.add('is-playing');
            
            audio.src = url;
            audio.load(); 
            document.getElementById('player-container').style.display = 'flex';
            audio.play();
            document.getElementById('play-pause').innerText = '⏸';
        }

        audio.onloadedmetadata = () => {
            if (currentFileId) {
                const savedTime = getProgress(currentFileId);
                if (savedTime > 0 && savedTime < audio.duration * 0.95) audio.currentTime = savedTime;
            }
        };

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause').innerText = '⏸'; }
            else { audio.pause(); document.getElementById('play-pause').innerText = '▶'; }
        }

        function skip(s) { audio.currentTime += s; }
        function stopPlayer() { audio.pause(); document.getElementById('player-container').style.display = 'none'; }

        audio.ontimeupdate = () => {
            prog.max = audio.duration || 0;
            prog.value = audio.currentTime;
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            if (audio.duration) {
                document.getElementById('duration-time').innerText = formatTime(audio.duration);
                if (currentFileId && audio.currentTime > 1) saveProgress(currentFileId, audio.currentTime);
                if ((audio.currentTime / audio.duration > 0.95) && !isDone(currentFileId)) {
                    markDone(currentFileId);
                    loadContent(currentPath, false); // Обновляем список, чтобы появилась галочка
                }
            }
        };

        prog.oninput = () => { audio.currentTime = prog.value; };
        
        audio.onended = () => {
            const currentIndex = currentFilesList.findIndex(f => f.telegram_id === currentFileId);
            if (currentIndex !== -1 && currentIndex < currentFilesList.length - 1) {
                const nextFile = currentFilesList[currentIndex + 1];
                const streamUrl = `${WORKER_URL}/stream/${nextFile.telegram_id}`;
                play(streamUrl, nextFile.name, nextFile.telegram_id);
            } else { stopPlayer(); }
        };

        // Запуск
        fetchAllData();
    </script>
</body>
</html>
