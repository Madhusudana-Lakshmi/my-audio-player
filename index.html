<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacred Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #8e6d45; --bg-color: #fcf9f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: #333; margin: 0; padding: 15px; }
        h2 { text-align: center; color: var(--main-color); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; border-radius: 12px; padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
        .card img { width: 100%; border-radius: 8px; height: 140px; object-fit: cover; background: #eee; }
        .title { font-size: 14px; font-weight: bold; margin: 8px 0 4px 0; height: 34px; overflow: hidden; }
        .price { color: var(--main-color); font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        button { background: var(--main-color); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>
    <h2>Духовные Артефакты ✨</h2>
    <div class="grid" id="catalog"></div>

    <script>
        // Загружаем products.js с "анти-кешем"
        const script = document.createElement('script');
        script.src = "products.js?v=" + Date.now();
        document.head.appendChild(script);

        script.onload = function() {
            let tg = window.Telegram.WebApp;
            tg.expand();
            const catalog = document.getElementById('catalog');

            if (typeof products !== 'undefined') {
                products.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${item.img}?v=${Date.now()}" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                        <div class="title">${item.name}</div>
                        <div class="price">${item.price} ₽</div>
                        <button onclick="sendOrder('${item.name}')">Купить</button>
                    `;
                    catalog.appendChild(card);
                });
            }
        };

        function sendOrder(name) {
            window.Telegram.WebApp.sendData("Заказ: " + name);
            window.Telegram.WebApp.close();
        }
    </script>
</body>
</html>
