<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnava Lectoriya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { margin-bottom: 20px; font-size: 20px; text-align: center; }
        
        /* Список папок и файлов */
        #content { width: 100%; max-width: 400px; }
        .item {
            padding: 12px; margin-bottom: 8px;
            background: rgba(0,0,0,0.05); border-radius: 10px;
            cursor: pointer; display: flex; align-items: center;
            transition: background 0.2s;
        }
        .item:active { background: rgba(0,0,0,0.1); }
        .item-icon { margin-right: 12px; font-size: 20px; }
        .item-name { flex-grow: 1; font-weight: 500; }

        /* Плеер */
        #player-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--tg-theme-bg-color);
            border-top: 1px solid rgba(0,0,0,0.1);
            padding: 15px; display: none; flex-direction: column;
        }
        audio { width: 100%; margin-top: 10px; }
        .close-player { align-self: flex-end; cursor: pointer; color: var(--tg-theme-button-color); font-weight: bold; }

        /* Кнопка загрузки */
        #upload-section {
            width: 100%; max-width: 400px;
            margin-bottom: 20px; padding: 15px;
            border: 2px dashed var(--tg-theme-button-color);
            border-radius: 12px; text-align: center;
        }
        #file-input { display: none; }
        .upload-label {
            color: var(--tg-theme-button-color);
            cursor: pointer; font-weight: bold; display: block;
        }
        #status { font-size: 12px; margin-top: 8px; color: #666; }

        .back-btn {
            align-self: flex-start; margin-bottom: 15px;
            color: var(--tg-theme-button-color); cursor: pointer;
        }
    </style>
</head>
<body>

    <h2 id="folder-title">Vaishnava Lectoriya</h2>

    <div id="upload-section">
        <label for="file-input" class="upload-label">
            ➕ Нажмите здесь, чтобы загрузить файл <br>
            <span style="font-size: 11px; font-weight: normal;">(Любой размер, без ограничений Telegram)</span>
        </label>
        <input type="file" id="file-input" accept="audio/*">
        <div id="status">Выберите папку, затем файл</div>
    </div>

    <div id="back-container" class="back-btn" style="display: none;" onclick="loadFolders()">⬅ Назад к папкам</div>

    <div id="content">Загрузка...</div>

    <div id="player-container">
        <div class="close-player" onclick="closePlayer()">Закрыть ✖</div>
        <div id="now-playing" style="font-weight: bold; font-size: 14px;"></div>
        <audio id="audio-player" controls controlsList="nodownload"></audio>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SUPABASE_URL = 'https://sfwlfdxwqnrvypaifayi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmd2xmZHh3cW5ydnlwYWlmYXlpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDM2NTc3OSwiZXhwIjoyMDg5OTQxNzc5fQ.mBQPFZ7t_q_GsJrBVc1L1UlvKapmPBLGHXhLKdnUr3k';
        const ROOT_ID = '2a23cff1-1d43-4ce9-a952-65b7d7d3f1d0';
        
        let currentFolderId = null;

        // 1. ЗАГРУЗКА ПАПОК
        async function loadFolders() {
            currentFolderId = null;
            document.getElementById('back-container').style.display = 'none';
            document.getElementById('folder-title').innerText = "Ваши папки";
            document.getElementById('status').innerText = "Сначала выберите папку для загрузки";
            
            const res = await fetch(`${SUPABASE_URL}/rest/v1/items?type=eq.folder&parent_id=eq.${ROOT_ID}`, {
                headers: { 'apikey': SUPABASE_KEY }
            });
            const data = await res.json();
            renderItems(data, true);
        }

        // 2. ЗАГРУЗКА ФАЙЛОВ В ПАПКЕ
        async function loadFiles(folderId, folderName) {
            currentFolderId = folderId;
            document.getElementById('back-container').style.display = 'block';
            document.getElementById('folder-title').innerText = folderName;
            document.getElementById('status').innerText = `Готов к загрузке в "${folderName}"`;

            const res = await fetch(`${SUPABASE_URL}/rest/v1/items?parent_id=eq.${folderId}`, {
                headers: { 'apikey': SUPABASE_KEY }
            });
            const data = await res.json();
            renderItems(data, false);
        }

        function renderItems(items, isFolderList) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                const icon = item.type === 'folder' ? '📁' : '🎵';
                div.innerHTML = `<span class="item-icon">${icon}</span><span class="item-name">${item.name}</span>`;
                
                div.onclick = () => {
                    if (item.type === 'folder') {
                        loadFiles(item.id, item.name);
                    } else {
                        playAudio(item.url, item.name);
                    }
                };
                container.appendChild(div);
            });
        }

        // 3. ПЛЕЕР
        function playAudio(url, name) {
            const container = document.getElementById('player-container');
            const player = document.getElementById('audio-player');
            document.getElementById('now-playing').innerText = name;
            player.src = url;
            container.style.display = 'flex';
            player.play();
        }

        function closePlayer() {
            const player = document.getElementById('audio-player');
            player.pause();
            document.getElementById('player-container').style.display = 'none';
        }

        // 4. ЗАГРУЗКА ФАЙЛА (Вариант А)
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!currentFolderId) {
                alert("Пожалуйста, сначала выберите папку!");
                return;
            }

            const status = document.getElementById('status');
            status.innerText = "⏳ Загрузка файла... Пожалуйста, подождите.";
            
            const fileName = `${Date.now()}_${file.name}`;
            const filePath = `audio-files/${fileName}`;

            try {
                // А. Загружаем в Storage
                const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${filePath}`, {
                    method: 'POST',
                    headers: { 
                        'apikey': SUPABASE_KEY, 
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': file.type 
                    },
                    body: file
                });

                if (!uploadRes.ok) throw new Error("Ошибка Storage");

                // Б. Записываем в базу
                const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${filePath}`;
                const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/items`, {
                    method: 'POST',
                    headers: { 
                        'apikey': SUPABASE_KEY, 
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: file.name,
                        type: 'file',
                        url: publicUrl,
                        parent_id: currentFolderId
                    })
                });

                if (!dbRes.ok) throw new Error("Ошибка базы данных");

                status.innerText = "✅ Успешно загружено!";
                loadFiles(currentFolderId, document.getElementById('folder-title').innerText); // Обновить список
            } catch (err) {
                console.error(err);
                status.innerText = "❌ Ошибка загрузки. Попробуйте снова.";
            }
        };

        loadFolders();
    </script>
</body>
</html>
