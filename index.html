<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vaishnava Lectoriya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-image: url('http://googleusercontent.com/image_collection/image_retrieval/7191242288474391484_0');
            --tg-theme-button-color: #3897f0;
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            color: #fff; margin: 0; padding: 0; 
            background: #1a1a1b; min-height: 100vh;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-image); background-size: cover;
            background-position: center; z-index: -2;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: -1;
        }

        .header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #content { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; padding-bottom: 250px; }
        
        .item { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 20px 10px; text-align: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }

        .item.type-file { grid-column: span 2; display: flex; align-items: center; text-align: left; padding: 12px; }
        .item-icon { font-size: 28px; margin-bottom: 5px; }
        .item.type-file .item-icon { margin: 0 15px 0 0; font-size: 20px; }
        .item-name { font-size: 14px; word-break: break-word; flex-grow: 1; }

        /* Стиль для галочки прослушано */
        .done-mark { color: #4CAF50; font-weight: bold; margin-left: 10px; font-size: 18px; }
        .item.is-done { border: 1px solid rgba(76, 175, 80, 0.4); background: rgba(76, 175, 80, 0.1); }

        .del-btn {
            position: absolute; top: 5px; right: 10px; 
            color: #ff4d4d; font-size: 24px; font-weight: bold; 
            padding: 5px; cursor: pointer; z-index: 10;
        }

        #player-container { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(0, 0, 0, 0.95); padding: 15px 0 35px; display: none; 
            flex-direction: column; border-top: 1px solid #333; z-index: 1000;
            border-radius: 20px 20px 0 0;
        }

        .time-info { 
            display: flex; justify-content: space-between; 
            width: 90%; margin: 0 auto 5px; 
            font-size: 12px; font-family: monospace; color: #aaa;
        }

        .controls { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 10px; }
        .btn-play { width: 70px; height: 70px; border-radius: 50%; background: var(--tg-theme-button-color); border: none; font-size: 30px; color: #fff; }
        
        #progress-bar { width: 90%; margin: 0 auto 10px; height: 10px; accent-color: var(--tg-theme-button-color); }
        .back-btn { padding: 15px; color: var(--tg-theme-button-color); font-weight: bold; cursor: pointer; }
        
        #admin-panel { display: none; padding: 10px; background: rgba(0,0,0,0.5); flex-direction: column; align-items: center; gap: 10px; }
        .admin-buttons { display: flex; gap: 10px; }
        .admin-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;}
        #upload-status { font-size: 14px; color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="admin-buttons">
            <button class="admin-btn" onclick="createNewFolder()">+ Папка</button>
            <button class="admin-btn" id="upload-btn" onclick="document.getElementById('file-input').click()" style="display:none">+ Файлы</button>
        </div>
        <div id="upload-status"></div>
        <input type="file" id="file-input" multiple style="display:none">
    </div>

    <div class="header"><h2>🪷 Лекторий</h2></div>
    <div id="back-container" class="back-btn" style="display: none;" onclick="goBack()">⬅ Назад</div>
    <div id="content">Загрузка...</div>

    <div id="player-container">
        <div id="now-playing" style="text-align: center; margin-bottom: 10px; padding: 0 15px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
        
        <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration-time">0:00</span>
        </div>
        
        <input type="range" id="progress-bar" value="0">
        
        <div class="controls">
            <button onclick="skip(-15)" style="background:none; border:none; color:#fff; font-size:30px;">⏪</button>
            <button id="play-pause" class="btn-play" onclick="togglePlay()">▶</button>
            <button onclick="skip(15)" style="background:none; border:none; color:#fff; font-size:30px;">⏩</button>
        </div>
        <button onclick="stopPlayer()" style="margin-top:15px; background:none; border:none; color:#666; font-size: 14px;">Закрыть</button>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SUPABASE_URL = 'https://sfwlfdxwqnrvypaifayi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmd2xmZHh3cW5ydnlwYWlmYXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjU3NzksImV4cCI6MjA4OTk0MTc3OX0.euqolkndodGmo0AJPaiCh60VU9nJjOZ11dz5boVTjnQ';
        const ROOT_ID = '2a23cff1-1d43-4ce9-a952-65b7d7d3f1d0';

        const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
        if (isAdmin) document.getElementById('admin-panel').style.display = 'flex';

        const audio = document.getElementById('main-audio');
        const prog = document.getElementById('progress-bar');
        
        let folderHistory = []; 
        let currentFolderId = null;
        let currentFileId = null;

        // Функции для локального хранения (прогресс и галочки)
        const saveProgress = (id, time) => localStorage.setItem(`pos_${id}`, time);
        const getProgress = (id) => parseFloat(localStorage.getItem(`pos_${id}`)) || 0;
        const markDone = (id) => localStorage.setItem(`done_${id}`, 'true');
        const isDone = (id) => localStorage.getItem(`done_${id}`) === 'true';

        async function loadContent(folderId, addToHistory = true) {
            try {
                if (addToHistory && currentFolderId !== null) folderHistory.push(currentFolderId);
                currentFolderId = folderId;
                document.getElementById('back-container').style.display = folderId === ROOT_ID ? 'none' : 'block';
                document.getElementById('upload-btn').style.display = folderId === ROOT_ID ? 'none' : 'block';

                const res = await fetch(`${SUPABASE_URL}/rest/v1/items?parent_id=eq.${folderId}&select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                render(await res.json());
            } catch (err) { console.error(err); }
        }

        function goBack() {
            const prevFolder = folderHistory.pop();
            loadContent(prevFolder || ROOT_ID, false);
        }

        function render(items) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            items.sort((a,b) => (a.type === b.type ? 0 : a.type === 'folder' ? -1 : 1));

            items.forEach(item => {
                const div = document.createElement('div');
                const done = isDone(item.id);
                // Добавляем класс is-done, если файл прослушан
                div.className = `item type-${item.type} ${done ? 'is-done' : ''}`;
                
                div.innerHTML = `
                    <div class="item-icon">${item.type === 'folder' ? '📁' : '🎙'}</div>
                    <div class="item-name" data-id="${item.id}">${item.name} ${done ? '<span class="done-mark">✓</span>' : ''}</div>
                `;
                
                if (isAdmin) {
                    const del = document.createElement('div');
                    del.className = 'del-btn';
                    del.innerHTML = '×';
                    del.onclick = (e) => { e.stopPropagation(); deleteItem(item.id, item.name); };
                    div.appendChild(del);
                }

                div.onclick = () => item.type === 'folder' ? loadContent(item.id) : play(item.url, item.name, item.id);
                container.appendChild(div);
            });
        }

        async function deleteItem(id, name) {
            if (!confirm(`Удалить "${name}"?`)) return;
            await fetch(`${SUPABASE_URL}/rest/v1/items?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            loadContent(currentFolderId, false);
        }

        function formatTime(s) {
            if (!s) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function play(url, name, id) {
            currentFileId = id;
            document.getElementById('now-playing').innerText = name;
            audio.src = url;
            document.getElementById('player-container').style.display = 'flex';
            audio.play();
            document.getElementById('play-pause').innerText = '⏸';
        }

        // Ждем, пока загрузятся данные аудиофайла, чтобы безопасно перемотать
        audio.onloadedmetadata = () => {
            if (currentFileId) {
                const savedTime = getProgress(currentFileId);
                // Если файл прослушан меньше чем на 95%, продолжаем с того же места
                if (savedTime > 0 && savedTime < audio.duration * 0.95) {
                    audio.currentTime = savedTime;
                }
            }
        };

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause').innerText = '⏸'; }
            else { audio.pause(); document.getElementById('play-pause').innerText = '▶'; }
        }

        function skip(s) { audio.currentTime += s; }
        function stopPlayer() { audio.pause(); document.getElementById('player-container').style.display = 'none'; }

        audio.ontimeupdate = () => {
            prog.max = audio.duration || 0;
            prog.value = audio.currentTime;
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            
            if (audio.duration) {
                document.getElementById('duration-time').innerText = formatTime(audio.duration);
                
                // Сохраняем прогресс (только если прошло больше 1 сек)
                if (currentFileId && audio.currentTime > 1) {
                    saveProgress(currentFileId, audio.currentTime);
                }
                
                // Если прослушано более 95% и галочка еще не стоит
                if ((audio.currentTime / audio.duration > 0.95) && !isDone(currentFileId)) {
                    markDone(currentFileId);
                    
                    // Мгновенно зажигаем галочку на экране без перезагрузки папки
                    const nameElements = document.querySelectorAll('.item-name');
                    nameElements.forEach(el => {
                        if (el.getAttribute('data-id') === currentFileId) {
                            el.parentElement.classList.add('is-done');
                            if (!el.innerHTML.includes('done-mark')) {
                                el.innerHTML += ' <span class="done-mark">✓</span>';
                            }
                        }
                    });
                }
            }
        };

        prog.oninput = () => { audio.currentTime = prog.value; };

        async function createNewFolder() {
            const n = prompt("Имя папки:");
            if (!n) return;
            await fetch(`${SUPABASE_URL}/rest/v1/items`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: n, type: 'folder', parent_id: currentFolderId })
            });
            loadContent(currentFolderId, false);
        }

        document.getElementById('file-input').onchange = async (e) => {
            const files = e.target.files;
            const status = document.getElementById('upload-status');
            for (let i = 0; i < files.length; i++) {
                status.innerText = `⏳ ${i+1}/${files.length}`;
                const file = files[i];
                const path = `audio-files/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                await fetch(`${SUPABASE_URL}/storage/v1/object/${path}`, { 
                    method: 'POST', 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }, 
                    body: file 
                });
                await fetch(`${SUPABASE_URL}/rest/v1/items`, { 
                    method: 'POST', 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ name: file.name, type: 'file', url: `${SUPABASE_URL}/storage/v1/object/public/${path}`, parent_id: currentFolderId }) 
                });
            }
            status.innerText = "✅ Готово";
            setTimeout(() => status.innerText = "", 2000);
            loadContent(currentFolderId, false);
        };

        loadContent(ROOT_ID, false);
    </script>
</body>
</html>
