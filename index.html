<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vaishnava Lectoriya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Ссылка на фоновое изображение (Лотос) */
            --bg-image: url('http://googleusercontent.com/image_collection/image_retrieval/7191242288474391484_0');
            --tg-theme-button-color: #3897f0;
            --overlay-color: rgba(0, 0, 0, 0.65);
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            color: #fff; margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            min-height: 100vh; position: relative;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-image); background-size: cover;
            background-position: center; z-index: -2;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--overlay-color); z-index: -1;
        }

        .header { 
            padding: 15px; background: rgba(0,0,0,0.3); 
            display: flex; align-items: center; justify-content: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        h2 { margin: 0; font-size: 18px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        #content { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; padding-bottom: 240px; }
        
        .item { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px);
            border-radius: 16px; padding: 25px 10px; 
            display: flex; flex-direction: column; align-items: center; 
            text-align: center; cursor: pointer; position: relative; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .item.type-file { grid-column: span 2; flex-direction: row; text-align: left; padding: 22px 15px; }
        .item-icon { font-size: 32px; margin-right: 15px; }
        .item-name { font-weight: 600; font-size: 17px; flex-grow: 1; overflow: hidden; }
        
        .check-mark { position: absolute; top: 10px; left: 10px; font-size: 16px; display: none; }
        .item.is-listened .check-mark { display: block; }

        /* ОГРОМНЫЙ ПЛЕЕР */
        #player-container { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(15,15,15,0.98); backdrop-filter: blur(15px);
            display: none; flex-direction: column; border-radius: 25px 25px 0 0; 
            z-index: 1000; padding: 15px 0 40px 0; border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .progress-wrapper { width: 100%; padding: 15px 0; }
        #progress-bar { width: 100%; height: 16px; background: rgba(255,255,255,0.1); appearance: none; outline: none; margin: 0; }
        #progress-bar::-webkit-slider-thumb { appearance: none; width: 28px; height: 28px; background: var(--tg-theme-button-color); border-radius: 50%; }

        .time-info { display: flex; justify-content: space-between; padding: 0 25px; font-size: 14px; color: #aaa; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 50px; margin-top: 25px; }
        .btn-play { width: 90px; height: 90px; border-radius: 50%; background: var(--tg-theme-button-color); color: white; border: none; font-size: 42px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(56,151,240,0.4); }
        .btn-skip { background: none; border: none; font-size: 35px; color: #fff; opacity: 0.8; }
        .close-x { text-align: right; padding: 0 25px; font-size: 35px; color: #555; }

        .back-btn { padding: 18px; color: var(--tg-theme-button-color); font-weight: bold; cursor: pointer; font-size: 18px; }
        
        /* АДМИНКА */
        #admin-panel { display: none; padding: 15px; background: rgba(0,0,0,0.6); gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .admin-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 14px 22px; border-radius: 12px; font-weight: 600; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; z-index: 10; }
        .error-msg { color: #ffbcbc; padding: 20px; text-align: center; font-weight: bold; grid-column: span 2; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <button class="admin-btn" onclick="createNewFolder()">+ Папка</button>
        <button class="admin-btn" onclick="document.getElementById('file-input').click()">+ Файлы</button>
        <input type="file" id="file-input" multiple style="display:none">
        <div id="upload-status" style="font-size: 13px; color: #3897f0; margin-top: 10px; text-align: center;"></div>
    </div>

    <div class="header"><h2>🪷 Лекторий</h2></div>
    <div id="back-container" class="back-btn" style="display: none;" onclick="loadFolders()">⬅ Назад</div>

    <div id="content">Загрузка...</div>

    <div id="player-container">
        <div class="close-x" onclick="stopPlayer()">×</div>
        <div id="now-playing" style="text-align: center; font-weight: bold; padding: 0 20px;"></div>
        <div class="progress-wrapper">
            <input type="range" id="progress-bar" value="0" min="0" step="1">
        </div>
        <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration-time">0:00</span>
        </div>
        <div class="controls">
            <button class="btn-skip" onclick="skip(-15)">⏪</button>
            <button id="play-pause" class="btn-play" onclick="togglePlay()">▶</button>
            <button class="btn-skip" onclick="skip(15)">⏩</button>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SUPABASE_URL = 'https://sfwlfdxwqnrvypaifayi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmd2xmZHh3cW5ydnlwYWlmYXlpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDM2NTc3OSwiZXhwIjoyMDg5OTQxNzc5fQ.mBQPFZ7t_q_GsJrBVc1L1UlvKapmPBLGHXhLKdnUr3k';
        const ROOT_ID = '2a23cff1-1d43-4ce9-a952-65b7d7d3f1d0';
        
        const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
        if (isAdmin) document.getElementById('admin-panel').style.display = 'flex';

        const audio = document.getElementById('main-audio');
        const prog = document.getElementById('progress-bar');
        const playBtn = document.getElementById('play-pause');
        let currentId = null;
        let currentFolderId = null;

        async function loadFolders() {
            try {
                currentFolderId = null;
                document.getElementById('back-container').style.display = 'none';
                const res = await fetch(`${SUPABASE_URL}/rest/v1/items?type=eq.folder&parent_id=eq.${ROOT_ID}`, { headers: { 'apikey': SUPABASE_KEY } });
                if (!res.ok) throw new Error();
                render(await res.json());
            } catch (e) {
                document.getElementById('content').innerHTML = "<div class='error-msg'>⚠️ Слишком много запросов. Подождите 5-10 минут.</div>";
            }
        }

        async function loadFiles(id, name) {
            try {
                currentFolderId = id;
                document.getElementById('back-container').style.display = 'block';
                const res = await fetch(`${SUPABASE_URL}/rest/v1/items?parent_id=eq.${id}`, { headers: { 'apikey': SUPABASE_KEY } });
                if (!res.ok) throw new Error();
                render(await res.json());
            } catch (e) {
                document.getElementById('content').innerHTML = "<div class='error-msg'>⚠️ Ошибка доступа. Попробуйте позже.</div>";
            }
        }

        function render(items) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            items.sort((a,b) => (a.type === b.type ? 0 : a.type === 'folder' ? -1 : 1));
            const list = JSON.parse(localStorage.getItem('listened') || '[]');

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = `item type-${item.type} ${list.
