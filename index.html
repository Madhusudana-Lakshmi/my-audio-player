<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacred Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ПЕРЕМЕННЫЕ ЦВЕТОВ */
        :root { 
            --main-color: #8e6d45; 
            --bg-color: #fcf9f5; 
            --app-bg: #e0e0e0;
            --card-bg: white;
            --text-color: #333;
            --btn-text: white;
            --shadow: rgba(0,0,0,0.1);
        }

        /* ТЕМНАЯ ТЕМА */
        body.dark-mode {
            --bg-color: #1a1a1a;
            --app-bg: #121212;
            --card-bg: #2d2d2d;
            --text-color: #f5f5f5;
            --shadow: rgba(0,0,0,0.5);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--app-bg); 
            margin: 0; 
            display: flex;
            justify-content: center;
            color: var(--text-color);
            transition: background 0.3s ease;
        }

        .app-container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            padding: 15px;
            box-shadow: 0 0 20px var(--shadow);
            box-sizing: border-box;
            position: relative;
            transition: background 0.3s ease;
        }

        /* КНОПКА СМЕНЫ ТЕМЫ */
        .theme-toggle-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: var(--card-bg);
            border-radius: 50%;
            border: none;
            box-shadow: 0 2px 8px var(--shadow);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 100;
            color: var(--text-color);
        }

        .header-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
            min-height: 40px;
            padding-right: 40px; /* Чтобы заголовок не налезал на кнопку темы */
        }

        h2 { text-align: center; color: var(--main-color); margin: 0; font-size: 20px; }
        
        .back-circle-btn {
            display: none;
            position: absolute;
            left: 0;
            width: 40px;
            height: 40px;
            background: var(--card-bg);
            border-radius: 50%;
            border: none;
            box-shadow: 0 2px 5px var(--shadow);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--main-color);
            z-index: 10;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .cat-card { position: relative; border-radius: 18px; overflow: hidden; aspect-ratio: 3/4; cursor: pointer; box-shadow: 0 4px 10px var(--shadow); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .cat-card .title-overlay { position: absolute; bottom: 0; left: 0; right: 0; color: white; padding: 10px; font-weight: bold; font-size: 16px; text-align: center; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
        
        .card { background: var(--card-bg); border-radius: 18px; padding: 8px; box-shadow: 0 2px 8px var(--shadow); display: flex; flex-direction: column; text-align: center; cursor: pointer; transition: background 0.3s ease; }
        .card img { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; border-radius: 8px; background: #eee; margin-bottom: 8px; }
        .title { font-size: 14px; font-weight: bold; margin: 0 0 4px 0; height: 34px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--text-color); }
        .price { color: var(--main-color); font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        
        .buy-btn { background: var(--main-color); color: var(--btn-text); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        #products-view { display: none; }

        #product-modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; height: 100vh; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
        }
        
        .close-modal-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            line-height: 40px;
            cursor: pointer;
            z-index: 1001;
            backdrop-filter: blur(5px);
        }

        .modal-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .modal-img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="">

    <div class="app-container">
        <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>

        <div class="header-panel">
            <button class="back-circle-btn" id="back-btn" onclick="showCategories()">←</button>
            <h2 id="page-title">Каталог ✨</h2>
        </div>
        
        <div class="grid" id="categories-view"></div>

        <div id="products-view">
            <div class="grid" id="catalog"></div>
        </div>

        <div id="product-modal">
            <button class="close-modal-btn" onclick="closeModal()">×</button>
            <div class="modal-content" id="modal-content"></div>
        </div>
    </div>

    <script>
        // Логика переключения темы
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-btn');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeBtn.innerText = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                themeBtn.innerText = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        // Загрузка сохраненной темы
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-btn').innerText = '☀️';
        }

        const script = document.createElement('script');
        script.src = "products.js?v=" + Date.now();
        document.head.appendChild(script);

        const categoryList = ["Благовония", "Одежда", "Мурти", "Четки", "Параферналии", "Красота"];

        script.onload = function() {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.expand();
            }
            renderCategories();
        };

        function renderCategories() {
            document.getElementById('categories-view').style.display = 'grid';
            document.getElementById('products-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('page-title').innerText = "Каталог ✨";
            
            const catView = document.getElementById('categories-view');
            catView.innerHTML = '';

            categoryList.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'cat-card';
                card.onclick = () => showProducts(cat);
                card.innerHTML = `
                    <img src="categories/${cat}.jpg?v=${Date.now()}" onerror="this.src='https://via.placeholder.com/300x400?text=${cat}'">
                    <div class="title-overlay">${cat}</div>
                `;
                catView.appendChild(card);
            });
        }

        function showProducts(categoryName) {
            document.getElementById('categories-view').style.display = 'none';
            document.getElementById('products-view').style.display = 'block';
            document.getElementById('page-title').innerText = categoryName;
            document.getElementById('back-btn').style.display = 'flex';

            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';

            if (typeof products !== 'undefined') {
                const filteredProducts = products.filter(p => p.category === categoryName);
                filteredProducts.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openModal(item);
                    card.innerHTML = `
                        <img src="${item.img}?v=${Date.now()}" onerror="this.src='https://via.placeholder.com/300x400?text=Нет+Фото'">
                        <div class="title">${item.name}</div>
                        <div class="price">${item.price} ₴</div>
                        <button class="buy-btn" onclick="event.stopPropagation(); sendOrder('${item.category}', '${item.name}', '${item.price}')">Купить</button>
                    `;
                    catalog.appendChild(card);
                });
            }
        }

        function openModal(item) {
            const modal = document.getElementById('product-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `<img class="modal-img" src="${item.img}?v=${Date.now()}" onerror="this.src='https://via.placeholder.com/600x800?text=Ошибка+загрузки'">`;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function showCategories() {
            renderCategories();
        }

        function sendOrder(category, name, price) {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(`Заказ: ${name} (${category}) - ${price} ₴`);
                window.Telegram.WebApp.close();
            }
        }
    </script>
</body>
</html>
