<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vaishnava Lectoriya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        
     body {
            font-family: -apple-system, system-ui, sans-serif;
            color: #fff; /* Возвращаем белый текст */
            margin: 0;
            padding: 0;
            background: #000; /* Твой старый темно-серый/черный фон */
            min-height: 100vh;
        }

       .header {
        position: fixed; /* Фиксируем наверху */
        top: 0px; /* Шапка немного отступит от верхнего края */
left: 10px; /* Отступ слева */
width: calc(100% - 40px); /* Чтобы шапка не вылезала за экран из-за отступов */
        left: 0;
        width: 100%;
        z-index: 1000; /* Чтобы была поверх папок */
        height: 85px; /* Фиксируем высоту здесь */
        
        /* Скругление нижних углов */
        border-radius: 20px; 
        
        /* Настройки картинки */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
        /* Тень, чтобы шапка отделялась от папок при скролле */
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

        #content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 100px 12px 200px 12px; /* 100px сверху — это запас под шапку */
        }

        /* ОСНОВНОЙ СТИЛЬ ПЛИТКИ */
        .item {
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Текст падает вниз */
            height: 140px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        /* НАЗВАНИЕ ВНИЗУ */
        .item-name {
            font-size: 13px; /* Был 11px, сделал чуть крупнее */
            font-weight: 500; /* Максимально жирный шрифт */
            line-height: 1.2;
            padding: 8px 5px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,1); /* Усилил тень, чтобы буквы «горели» на фоне */
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0) 100%);
        }
        .item-icon {
            font-size: 32px;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            z-index: 1;
        }

        .item.is-playing { 
            border: 1px solid var(--tg-theme-button-color); 
            background: rgba(56, 151, 240, 0.15); 
            box-shadow: 0 0 8px rgba(56, 151, 240, 0.4); 
        }

        .done-mark { color: #4CAF50; font-weight: bold; margin-left: 5px; font-size: 14px; }
        .item.is-done { border: 1px solid rgba(76, 175, 80, 0.4); background: rgba(76, 175, 80, 0.1); }

        .del-btn {
            position: absolute; top: 5px; right: 10px; 
            color: #ff4d4d; font-size: 24px; font-weight: bold; 
            padding: 5px; cursor: pointer; z-index: 10;
        }

        #player-container { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(0, 0, 0, 0.95); padding: 15px 0 35px; display: none; 
            flex-direction: column; border-top: 1px solid #333; z-index: 1000;
            border-radius: 20px 20px 0 0;
        }

        .time-info { 
            display: flex; justify-content: space-between; 
            width: 90%; margin: 0 auto 5px; 
            font-size: 12px; font-family: monospace; color: #aaa;
        }

        .controls { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 10px; }
        .btn-play { width: 70px; height: 70px; border-radius: 50%; background: var(--tg-theme-button-color); border: none; font-size: 30px; color: #fff; }
        
        #progress-bar { width: 90%; margin: 0 auto 10px; height: 10px; accent-color: var(--tg-theme-button-color); }
       .back-btn {
    position: fixed; /* Закрепляем её */
    top: 95px;       /* Опускаем внутрь шапки */
    left: 10px;      /* Отступ слева */
    z-index: 1100;   /* Ставим ВЫШЕ шапки (у шапки 1000) */
    padding: 10px 15px;
    background: rgba(0, 0, 0, 0.6); /* Темная подложка, чтобы текст «Назад» читался */
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    backdrop-filter: blur(5px); /* Красивое размытие под кнопкой */
}
        
        #admin-panel { display: none; padding: 10px; background: rgba(0,0,0,0.5); flex-direction: column; align-items: center; gap: 10px; }
        .admin-buttons { display: flex; gap: 10px; }
        .admin-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;}
        #upload-status { font-size: 14px; color: #4CAF50; font-weight: bold; }
        .cover-btn { 
            position: absolute; bottom: 5px; right: 10px; 
            color: rgba(255,255,255,0.7); font-size: 14px; 
            padding: 5px; cursor: pointer; z-index: 10; 
            opacity: 0.8; 
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="admin-buttons">
            <button class="admin-btn" onclick="createNewFolder()">+ Папка</button>
            <button class="admin-btn" id="upload-btn" onclick="document.getElementById('file-input').click()" style="display:none">+ Файлы</button>
        </div>
        <div id="upload-status"></div>
        <input type="file" id="file-input" multiple style="display:none">
    </div>

    <div class="header" style="background-image: url('https://sfwlfdxwqnrvypaifayi.supabase.co/storage/v1/object/public/folder-covers/folder-covers/9df9265e-e228-425b-b721-fa1b256952b6.jpg');"></div>
    <div id="back-container" class="back-btn" style="display: none;" onclick="goBack()">⬅ Назад</div>
    <div id="content">Загрузка...</div>

    <div id="player-container">
        <div id="now-playing" style="text-align: center; margin-bottom: 10px; padding: 0 15px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
        <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration-time">0:00</span>
        </div>
        <input type="range" id="progress-bar" value="0">
        <div class="controls">
            <button onclick="skip(-15)" style="background:none; border:none; color:#fff; font-size:30px;">⏪</button>
            <button id="play-pause" class="btn-play" onclick="togglePlay()">▶</button>
            <button onclick="skip(15)" style="background:none; border:none; color:#fff; font-size:30px;">⏩</button>
        </div>
        <button onclick="stopPlayer()" style="margin-top:15px; background:none; border:none; color:#666; font-size: 14px;">Закрыть</button>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SUPABASE_URL = 'https://sfwlfdxwqnrvypaifayi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmd2xmZHh3cW5ydnlwYWlmYXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjU3NzksImV4cCI6MjA4OTk0MTc3OX0.euqolkndodGmo0AJPaiCh60VU9nJjOZ11dz5boVTjnQ';
        const ROOT_ID = '2a23cff1-1d43-4ce9-a952-65b7d7d3f1d0';

        const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
        if (isAdmin) document.getElementById('admin-panel').style.display = 'flex';

        const audio = document.getElementById('main-audio');
        const prog = document.getElementById('progress-bar');
        
        let folderHistory = []; 
        let currentFolderId = null;
        let currentFileId = null;
        let currentFilesList = [];

        const saveProgress = (id, time) => localStorage.setItem(`pos_${id}`, time);
        const getProgress = (id) => parseFloat(localStorage.getItem(`pos_${id}`)) || 0;
        const markDone = (id) => localStorage.setItem(`done_${id}`, 'true');
        const isDone = (id) => localStorage.getItem(`done_${id}`) === 'true';

        async function loadContent(folderId, addToHistory = true) {
            try {
                if (addToHistory && currentFolderId !== null) folderHistory.push(currentFolderId);
                currentFolderId = folderId;
                document.getElementById('back-container').style.display = folderId === ROOT_ID ? 'none' : 'block';
                document.getElementById('upload-btn').style.display = folderId === ROOT_ID ? 'none' : 'block';

                const res = await fetch(`${SUPABASE_URL}/rest/v1/items?parent_id=eq.${folderId}&select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                render(await res.json());
            } catch (err) { console.error(err); }
        }

        function goBack() {
            const prevFolder = folderHistory.pop();
            loadContent(prevFolder || ROOT_ID, false);
        }

        function render(items) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            items.sort((a,b) => (a.type === b.type ? 0 : a.type === 'folder' ? -1 : 1));
            currentFilesList = items.filter(i => i.type === 'file');

            items.forEach(item => {
                const div = document.createElement('div');
                const done = isDone(item.id);
                div.className = `item item-type-${item.type} ${done ? 'is-done' : ''}`;
                
                if (item.type === 'folder' && item.image_url) {
                    div.style.backgroundImage = `url('${item.image_url}')`;
                    div.style.backgroundSize = 'cover';
                    div.style.backgroundPosition = 'center top';
                }

                const name = document.createElement('div');
                name.className = 'item-name';
                name.innerHTML = `${item.name} ${done ? '<span class="done-mark">✓</span>' : ''}`;
                name.setAttribute('data-id', item.id);

                if (!item.image_url || item.type === 'file') {
                    const icon = document.createElement('div');
                    icon.className = 'item-icon';
                    icon.innerHTML = item.type === 'folder' ? '📁' : '🎵';
                    div.appendChild(icon);
                }

                div.appendChild(name);

                if (isAdmin) {
                    const del = document.createElement('div');
                    del.className = 'del-btn';
                    del.innerHTML = '×';
                    del.onclick = (e) => { e.stopPropagation(); deleteItem(item.id, item.name); };
                    div.appendChild(del);
                    
                    // Кнопка переименования
                const edit = document.createElement('div');
                edit.style = "position: absolute; top: 5px; left: 10px; color: #ffcc00; font-size: 20px; cursor: pointer; z-index: 10;";
                edit.innerHTML = '✎';
                edit.onclick = (e) => { 
                    e.stopPropagation(); 
                    renameFolder(item.id, item.name); 
                };
                div.appendChild(edit);

                    if (item.type === 'folder') {
                        const cover = document.createElement('div');
                        cover.className = 'cover-btn';
                        cover.innerHTML = '🖼';
                        cover.onclick = (e) => { e.stopPropagation(); uploadFolderCover(item.id); };
                        div.appendChild(cover);
                    }
                }

                div.onclick = () => item.type === 'folder' ? loadContent(item.id) : play(item.url, item.name, item.id);
                container.appendChild(div);
            });
        }
async function renameFolder(id, oldName) {
            const newName = prompt("Введите новое название:", oldName);
            if (!newName || newName === oldName) return;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/items?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 
                        'apikey': SUPABASE_KEY, 
                        'Authorization': `Bearer ${SUPABASE_KEY}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ name: newName })
                });

                if (res.ok) {
                    loadContent(currentFolderId, false);
                } else {
                    alert("Не удалось переименовать");
                }
            } catch (err) {
                console.error(err);
            }
        }
        async function uploadFolderCover(folderId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const status = document.getElementById('upload-status');
                status.innerText = "⏳ Загружаю...";
                const path = `folder-covers/${Date.now()}_cover`;
                try {
                    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/folder-covers/${path}`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
                        body: file
                    });
                    if (!uploadRes.ok) throw new Error('Storage error');
                    const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/folder-covers/${path}`;
                    await fetch(`${SUPABASE_URL}/rest/v1/items?id=eq.${folderId}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image_url: imageUrl })
                    });
                    status.innerText = "✅ Готово!";
                    setTimeout(() => status.innerText = "", 2000);
                    loadContent(currentFolderId, false);
                } catch (err) { status.innerText = "❌ Ошибка"; }
            };
            input.click();
        }

        async function deleteItem(id, name) {
            if (!confirm(`Удалить "${name}"?`)) return;
            await fetch(`${SUPABASE_URL}/rest/v1/items?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            loadContent(currentFolderId, false);
        }

        function formatTime(s) {
            if (!s) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function play(url, name, id) {
            currentFileId = id;
            document.getElementById('now-playing').innerText = name;
            document.querySelectorAll('.item').forEach(el => el.classList.remove('is-playing'));
            const currentNameEl = document.querySelector(`.item-name[data-id="${id}"]`);
            if (currentNameEl) currentNameEl.parentElement.classList.add('is-playing');
            
            audio.src = url;
            audio.load(); 
            document.getElementById('player-container').style.display = 'flex';
            audio.play();
            document.getElementById('play-pause').innerText = '⏸';
        }

        audio.onloadedmetadata = () => {
            if (currentFileId) {
                const savedTime = getProgress(currentFileId);
                if (savedTime > 0 && savedTime < audio.duration * 0.95) audio.currentTime = savedTime;
            }
        };

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause').innerText = '⏸'; }
            else { audio.pause(); document.getElementById('play-pause').innerText = '▶'; }
        }

        function skip(s) { audio.currentTime += s; }
        function stopPlayer() { audio.pause(); document.getElementById('player-container').style.display = 'none'; }

        audio.ontimeupdate = () => {
            prog.max = audio.duration || 0;
            prog.value = audio.currentTime;
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            if (audio.duration) {
                document.getElementById('duration-time').innerText = formatTime(audio.duration);
                if (currentFileId && audio.currentTime > 1) saveProgress(currentFileId, audio.currentTime);
                if ((audio.currentTime / audio.duration > 0.95) && !isDone(currentFileId)) {
                    markDone(currentFileId);
                    loadContent(currentFolderId, false);
                }
            }
        };

        prog.oninput = () => { audio.currentTime = prog.value; };
        audio.onended = () => {
            const currentIndex = currentFilesList.findIndex(f => f.id === currentFileId);
            if (currentIndex !== -1 && currentIndex < currentFilesList.length - 1) {
                const nextFile = currentFilesList[currentIndex + 1];
                play(nextFile.url, nextFile.name, nextFile.id);
            } else { stopPlayer(); }
        };

        async function createNewFolder() {
            const n = prompt("Имя папки:");
            if (!n) return;
            await fetch(`${SUPABASE_URL}/rest/v1/items`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: n, type: 'folder', parent_id: currentFolderId })
            });
            loadContent(currentFolderId, false);
        }

        document.getElementById('file-input').onchange = async (e) => {
            const files = e.target.files;
            const status = document.getElementById('upload-status');
            for (let i = 0; i < files.length; i++) {
                status.innerText = `⏳ ${i+1}/${files.length}`;
                const file = files[i];
                const path = `audio-files/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                await fetch(`${SUPABASE_URL}/storage/v1/object/public/${path}`, { 
                    method: 'POST', 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }, 
                    body: file 
                });
                await fetch(`${SUPABASE_URL}/rest/v1/items`, { 
                    method: 'POST', 
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ name: file.name, type: 'file', url: `${SUPABASE_URL}/storage/v1/object/public/${path}`, parent_id: currentFolderId }) 
                });
            }
            status.innerText = "✅ Готово";
            loadContent(currentFolderId, false);
        };

        loadContent(ROOT_ID, false);
    </script>
</body>
</html>
