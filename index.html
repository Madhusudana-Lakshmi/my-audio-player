<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Лекции PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --card: #f2f2f7; --border: #d1d1d6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; background: var(--bg); border-bottom: 1px solid var(--border); }
        .search-bar { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); font-size: 16px; box-sizing: border-box; outline: none; }
        .breadcrumbs { margin-top: 10px; font-size: 14px; color: var(--accent); overflow-x: auto; white-space: nowrap; padding: 5px 0; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 220px; }
        .card { background: #fff; padding: 18px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .card:active { background: var(--card); }
        .player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 20px; border-top: 1px solid var(--border); box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #fff; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" class="search-bar" placeholder="🔍 Поиск лекции..." oninput="handleSearch(this.value)">
        <div class="breadcrumbs" id="bc">Загрузка навигации...</div>
    </div>
    <div class="content" id="list">Загрузка списка...</div>
    <div class="player">
        <div id="title" style="font-weight:bold; margin-bottom:12px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">🎵 Выберите лекцию</div>
        <audio id="audio" controls style="width:100%; height: 40px;"></audio>
        <div class="btn-row">
            <button class="btn" onclick="setSpeed()">⚡️ <span id="sp">1</span>x</button>
            <button class="btn" onclick="setTimer()">⏰ Таймер</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://sfwlfdxwqnrvypaifayi.supabase.co';
        const SB_KEY = 'sb_publishable_6ERrvoGOhpYD7P4TcYxmUA_gGHslTlR'; 

        const supabase = supabase.createClient(SB_URL, SB_KEY);
        let tg = window.Telegram.WebApp;
        tg.expand();

        let currentPath = [];
        let folderItems = [];

        async function init() {
            const { data, error } = await supabase.from('items').select('*').is('parent_id', null).single();
            if (data) { 
                currentPath = [{id: data.id, name: data.name}]; 
                load(data.id); 
            } else {
                document.getElementById('list').innerHTML = 'Ошибка: Корневая папка не найдена в БД.';
            }
        }

        async function load(pid) {
            document.getElementById('list').innerHTML = '<p style="text-align:center;">Загрузка...</p>';
            const { data } = await supabase.from('items').select('*').eq('parent_id', pid).order('type', {ascending:false}).order('name');
            if (data) { folderItems = data; render(data); }
            renderBC();
            if (currentPath.length > 1) tg.BackButton.show(); else tg.BackButton.hide();
        }

        function render(items) {
            const container = document.getElementById('list');
            if (items.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:gray; margin-top:30px;">Папка пуста</p>';
                return;
            }
            container.innerHTML = items.map(i => `
                <div class="card" onclick="clickItem('${i.id}','${i.type}','${i.name}','${i.url}')">
                    <span style="margin-right:12px; font-size:24px;">${i.type=='folder'?'📁':'📄'}</span>
                    <div style="flex:1; overflow:hidden; text-overflow:ellipsis; font-weight:500;">${i.name}</div>
                </div>
            `).join('');
        }

        function clickItem(id, type, name, url) {
            if (type === 'folder') { 
                currentPath.push({id, name}); 
                load(id); 
            } else { 
                const audio = document.getElementById('audio');
                audio.src = url;
                audio.play();
                document.getElementById('title').innerText = "🔊 " + name;
            }
        }

        function renderBC() { 
            document.getElementById('bc').innerHTML = currentPath.map((f, i) => 
                `<span onclick="jump(${i})" style="cursor:pointer; text-decoration:underline;">${f.name}</span>`
            ).join(' > '); 
        }

        function jump(index) {
            if (index === currentPath.length - 1) return;
            currentPath = currentPath.slice(0, index + 1);
            load(currentPath[index].id);
        }

        function setSpeed() { 
            const a = document.getElementById('audio');
            const s = [1, 1.25, 1.5, 2, 0.75];
            let n = s[(s.indexOf(a.playbackRate) + 1) % s.length];
            a.playbackRate = n; 
            document.getElementById('sp').innerText = n;
        }

        function setTimer() {
            let m = prompt("⏰ Остановить через сколько минут?", "30");
            if (m > 0) {
                tg.showAlert(`Таймер установлен на ${m} мин.`);
                setTimeout(() => {
                    document.getElementById('audio').pause();
                    tg.showAlert("Время вышло! Плеер остановлен.");
                }, m * 60000);
            }
        }

        function handleSearch(q) {
            const filtered = folderItems.filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
            render(filtered);
        }

        tg.BackButton.onClick(() => { 
            if (currentPath.length > 1) {
                currentPath.pop(); 
                load(currentPath[currentPath.length-1].id); 
            }
        });

        init();
    </script>
</body>
</html>
